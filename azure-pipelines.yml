# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/azure-pipelines-vscode/master/service-schema.json

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

parameters:
  - name: applyChanges
    displayName: Apply Terraform changes
    type: string
    default: 'false'

variables:
  azureServiceConnection: IAC-Conn
  terraformVersion: 1.5.7
  terraformWorkingDirectory: envs/dev
  terraformPlanFile: tfplan
  terraformPlanTextFile: tfplan.txt

stages:
  - stage: TerraformDev
    displayName: Terraform Dev
    jobs:
      - job: Plan
        displayName: Validate and plan
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              set -euo pipefail

              curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
              unzip -q terraform.zip
              sudo mv terraform /usr/local/bin/terraform
              terraform version
            displayName: Install Terraform

          - task: AzureCLI@2
            displayName: Terraform fmt, init, validate, and plan
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(terraformWorkingDirectory)
              inlineScript: |
                set -euo pipefail

                export ARM_CLIENT_ID="${servicePrincipalId}"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_TENANT_ID="${tenantId}"
                if [ -n "${idToken:-}" ]; then
                  export ARM_USE_OIDC=true
                  export ARM_OIDC_TOKEN="${idToken}"
                else
                  export ARM_CLIENT_SECRET="${servicePrincipalKey}"
                fi

                cat > ci.auto.tfvars <<'EOF'
                environment  = "dev"
                location     = "Central India"
                project_name = "event-driven"
                created_date = "2026-04-29"

                aks_authorized_ips = []

                tags = {
                  "Managed-By"  = "Terraform"
                  "Cost-Center" = "Engineering"
                  "Compliance"  = "SOC2"
                  "Owner"       = "Platform-Team"
                  "Backup"      = "true"
                }
                EOF

                terraform fmt -check -recursive ../..
                terraform init -input=false
                terraform validate
                terraform plan -input=false -out="$(terraformPlanFile)"
                terraform show -no-color "$(terraformPlanFile)" > "$(terraformPlanTextFile)"

          - publish: $(terraformWorkingDirectory)/$(terraformPlanFile)
            displayName: Publish Terraform binary plan
            artifact: terraform-dev-plan

          - publish: $(terraformWorkingDirectory)/$(terraformPlanTextFile)
            displayName: Publish Terraform readable plan
            artifact: terraform-dev-plan-text

          - task: AzureCLI@2
            displayName: Terraform apply
            condition: and(succeeded(), eq('${{ parameters.applyChanges }}', 'true'))
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(terraformWorkingDirectory)
              inlineScript: |
                set -euo pipefail

                export ARM_CLIENT_ID="${servicePrincipalId}"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_TENANT_ID="${tenantId}"
                if [ -n "${idToken:-}" ]; then
                  export ARM_USE_OIDC=true
                  export ARM_OIDC_TOKEN="${idToken}"
                else
                  export ARM_CLIENT_SECRET="${servicePrincipalKey}"
                fi

                terraform apply -input=false "$(terraformPlanFile)"
