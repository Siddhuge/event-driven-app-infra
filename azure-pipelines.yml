# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/azure-pipelines-vscode/master/service-schema.json

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  azureServiceConnection: IAC-Conn
  terraformVersion: 1.5.7

stages:

# =========================================
# 🔐 SECURITY SCAN (GLOBAL)
# =========================================
- stage: SecurityScan
  displayName: 🔐 Terraform Security Scan
  jobs:
    - job: Checkov
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            set -e
            pip install checkov

            echo "🔍 Running Checkov scan..."
            checkov -d . \
              --framework terraform \
              --quiet \
              --compact \
              --output cli \
              --soft-fail 
          displayName: Run Checkov Scan

# =========================================
# DEV
# =========================================
- stage: Dev_Plan
  dependsOn: SecurityScan
  jobs:
    - job: Plan
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
            unzip -q terraform.zip
            sudo mv terraform /usr/local/bin/terraform
          displayName: Install Terraform

        - task: AzureCLI@2
          inputs:
            azureSubscription: $(azureServiceConnection)
            addSpnToEnvironment: true
            scriptType: bash
            workingDirectory: terraform/envs/dev
            scriptLocation: inlineScript
            inlineScript: |
              set -e

              export ARM_CLIENT_ID="${servicePrincipalId}"
              export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
              export ARM_TENANT_ID="${tenantId}"
              export ARM_CLIENT_SECRET="${servicePrincipalKey}"

              terraform init

              echo "🔍 Drift detection..."
              terraform plan -detailed-exitcode -out=drift.tfplan || exit_code=$?

              if [ "${exit_code:-0}" -eq 2 ]; then
                echo "⚠️ Drift detected (allowed in DEV)"
              fi

              terraform plan -out=tfplan

        - publish: terraform/envs/dev/tfplan
          artifact: dev-plan

- stage: Dev_Apply
  dependsOn: Dev_Plan
  jobs:
    - deployment: Apply
      environment: dev
      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: dev-plan

              - task: AzureCLI@2
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  addSpnToEnvironment: true
                  scriptType: bash
                  workingDirectory: terraform/envs/dev
                  scriptLocation: inlineScript
                  inlineScript: |
                    export ARM_CLIENT_ID="${servicePrincipalId}"
                    export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                    export ARM_TENANT_ID="${tenantId}"
                    export ARM_CLIENT_SECRET="${servicePrincipalKey}"

                    terraform init
                    terraform apply -auto-approve "$(Pipeline.Workspace)/dev-plan/tfplan"

# =========================================
# UAT
# =========================================
- stage: UAT_Plan
  dependsOn: Dev_Apply
  jobs:
    - job: Plan
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - task: AzureCLI@2
          inputs:
            azureSubscription: $(azureServiceConnection)
            addSpnToEnvironment: true
            scriptType: bash
            workingDirectory: terraform/envs/uat
            scriptLocation: inlineScript
            inlineScript: |
              set -e

              export ARM_CLIENT_ID="${servicePrincipalId}"
              export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
              export ARM_TENANT_ID="${tenantId}"
              export ARM_CLIENT_SECRET="${servicePrincipalKey}"

              terraform init

              echo "🔍 Drift detection..."
              terraform plan -detailed-exitcode || exit_code=$?

              if [ "${exit_code:-0}" -eq 2 ]; then
                echo "❌ Drift detected in UAT"
                exit 1
              fi

              terraform plan -out=tfplan

        - publish: terraform/envs/uat/tfplan
          artifact: uat-plan

- stage: UAT_Apply
  dependsOn: UAT_Plan
  jobs:
    - deployment: Apply
      environment: uat   # 👈 Add approval in DevOps UI
      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: uat-plan

              - task: AzureCLI@2
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  addSpnToEnvironment: true
                  scriptType: bash
                  workingDirectory: terraform/envs/uat
                  scriptLocation: inlineScript
                  inlineScript: |
                    export ARM_CLIENT_ID="${servicePrincipalId}"
                    export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                    export ARM_TENANT_ID="${tenantId}"
                    export ARM_CLIENT_SECRET="${servicePrincipalKey}"

                    terraform init
                    terraform apply -auto-approve "$(Pipeline.Workspace)/uat-plan/tfplan"

# =========================================
# PROD
# =========================================
- stage: Prod_Plan
  dependsOn: UAT_Apply
  jobs:
    - job: Plan
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - task: AzureCLI@2
          inputs:
            azureSubscription: $(azureServiceConnection)
            addSpnToEnvironment: true
            scriptType: bash
            workingDirectory: terraform/envs/prod
            scriptLocation: inlineScript
            inlineScript: |
              set -e

              export ARM_CLIENT_ID="${servicePrincipalId}"
              export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
              export ARM_TENANT_ID="${tenantId}"
              export ARM_CLIENT_SECRET="${servicePrincipalKey}"

              terraform init

              echo "🔍 Drift detection..."
              terraform plan -detailed-exitcode || exit_code=$?

              if [ "${exit_code:-0}" -eq 2 ]; then
                echo "❌ Drift detected in PROD"
                exit 1
              fi

              terraform plan -out=tfplan

        - publish: terraform/envs/prod/tfplan
          artifact: prod-plan

- stage: Prod_Apply
  dependsOn: Prod_Plan
  jobs:
    - deployment: Apply
      environment: prod   # 👈 Strict approval required
      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: prod-plan

              - task: AzureCLI@2
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  addSpnToEnvironment: true
                  scriptType: bash
                  workingDirectory: terraform/envs/prod
                  scriptLocation: inlineScript
                  inlineScript: |
                    export ARM_CLIENT_ID="${servicePrincipalId}"
                    export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                    export ARM_TENANT_ID="${tenantId}"
                    export ARM_CLIENT_SECRET="${servicePrincipalKey}"

                    terraform init
                    terraform apply -auto-approve "$(Pipeline.Workspace)/prod-plan/tfplan"